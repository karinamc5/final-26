<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final: Magazines</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css" integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls" crossorigin="anonymous">
    <!-- <link rel="stylesheet" href="../styles/music.css" type="text/css"> -->
    <link rel="stylesheet" href="../styles/mobile.css" type="text/css" media="only screen and (max-width: 1400px)">
    <style>
        a {
            /* text-decoration: none; */
            color:rgb(0, 0, 0);
            font-weight:bolder;
        }

        section p {
            font-size: 16px;
        }

        .credits {
            text-align: center;
            padding-bottom: 50px;
        }
    </style>
</head>
<body>
        <div id="nav-placeholder"></div>
    <script>
        fetch('../pages/nav.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
            const s = document.createElement('script');
            s.src = '../scripts/mobile-nav.js';
            document.body.appendChild(s);
        });
    </script>
    <section class="credits">
        <h1>Magazine Scans & Credits</h1>
        <p><a href="https://archive.org/details/issue-114-cropped">"HM Magazine 20th Anniversary Issue" by Doug Van Pelt</a><br>The Magazine Rack, Internet Archive</p>
    </section>
    <section class="pure-g">
        <article class="pure-u-1-3">
            <img src="../images/1x/mag1.jpg" alt="the agony scene" class="pure-img">
        </article>
        <article class="pure-u-1-3">
            <img src="../images/1x/mag2.jpg" alt="every time i die" class="pure-img">
        </article>
        <article class="pure-u-1-3">
            <img src="../images/1x/mag3.jpg" alt="metal vs. emo" class="pure-img">
        </article>
    </section>
</body>
</html>
